<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- 🔷 Navbar -->
<div class="bg-white shadow p-4 flex justify-between items-center">
<div>

  <h1 class="text-3xl font-bold tracking-wide text-gray-800">
    Finance Dashboard
  </h1>
  <p class="text-sm text-gray-500">Track your income and expenses</p>
</div>
  <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">
    Logout
  </button>
</div>

<div class="p-6">

  <!-- 🔷 Stats -->
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-green-100 p-4 rounded shadow">
      <h2 class="text-sm text-gray-600">Total Income</h2>
      <p id="income" class="text-xl font-bold">₹0</p>
    </div>

    <div class="bg-red-100 p-4 rounded shadow">
      <h2 class="text-sm text-gray-600">Total Expense</h2>
      <p id="expense" class="text-xl font-bold">₹0</p>
    </div>

    <div class="bg-blue-100 p-4 rounded shadow">
      <h2 class="text-sm text-gray-600">Balance</h2>
      <p id="balance" class="text-xl font-bold">₹0</p>
    </div>
  </div>

  <!-- 🔷 Add Record -->
  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="font-bold mb-3">Add Record</h2>

    <div class="flex gap-2">
      <input id="amount" placeholder="Amount" class="p-2 border rounded w-1/4">
      <input id="category" placeholder="Category" class="p-2 border rounded w-1/4">

      <select id="type" class="p-2 border rounded w-1/4">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <button onclick="addRecord()" class="bg-blue-500 text-white px-4 rounded">
        Add
      </button>
    </div>
  </div>

  <!-- 🔷 Records -->
  <div class="bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-3">Records</h2>

    <table class="w-full text-left">
      <thead>
        <tr class="border-b">
          <th>Amount</th>
          <th>Category</th>
          <th>Type</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="records"></tbody>
    </table>
  </div>

</div>

<script>
const token = localStorage.getItem("token");

// 🔒 Redirect if not logged in
if (!token) {
  window.location.href = "login.html";
}

// 🔴 Logout
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

// ➕ Add Record
async function addRecord() {
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;
  const type = document.getElementById("type").value;

  if (!amount || !category) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/api/records", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ 
        amount: Number(amount), 
        category, 
        type 
      })
    });

    if (!res.ok) throw new Error("Failed to add record");

    alert("Record added successfully");

    document.getElementById("amount").value = "";
    document.getElementById("category").value = "";

    loadData();

  } catch (error) {
    alert(error.message);
  }
}

// 📥 Load Records + Stats
async function loadData() {
  try {
    const res = await fetch("http://localhost:5000/api/records", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!res.ok) throw new Error("Failed to fetch records");

    const data = await res.json();

    const summaryRes = await fetch("http://localhost:5000/api/dashboard/summary", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!summaryRes.ok) throw new Error("Failed to fetch summary");

    const summary = await summaryRes.json();

    document.getElementById("income").innerText = "₹" + summary.totalIncome;
    document.getElementById("expense").innerText = "₹" + summary.totalExpense;
    document.getElementById("balance").innerText = "₹" + summary.netBalance;

    const rows = data.length === 0 
      ? `<tr><td colspan="4" class="text-center p-4 text-gray-500">No records found</td></tr>`
      : data.map(r => `
        <tr class="border-b">
          <td>${r.amount}</td>
          <td>${r.category}</td>
          <td>${r.type}</td>
          <td>
            <button onclick="deleteRecord('${r._id}')" 
              class="bg-red-500 text-white px-2 py-1 rounded">
              Delete
            </button>
          </td>
        </tr>
      `).join("");

    document.getElementById("records").innerHTML = rows;

  } catch (error) {
    alert(error.message);
  }
}

// 🗑 Delete Record
async function deleteRecord(id) {
  const confirmDelete = confirm("Are you sure you want to delete this record?");
  if (!confirmDelete) return;

  try {
    const res = await fetch(`http://localhost:5000/api/records/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!res.ok) throw new Error("Failed to delete record");

    alert("Record deleted successfully");

    loadData();

  } catch (error) {
    alert(error.message);
  }
}

// 🚀 Initial Load
loadData();
</script>

</body>
</html>
